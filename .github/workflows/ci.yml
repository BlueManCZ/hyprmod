name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libgirepository-2.0-dev libgtk-4-dev libadwaita-1-dev
      - run: uv sync
      - run: uv run ruff check hyprmod/ tests/
      - run: uv run ruff format --check hyprmod/ tests/
      - run: uv run pyright hyprmod/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libgirepository-2.0-dev libgtk-4-dev libadwaita-1-dev
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --python ${{ matrix.python-version }}
      - run: uv run pytest tests/ -v
